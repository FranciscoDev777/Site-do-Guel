<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agendamento Gustavo</title>

  <link rel="stylesheet" href="../styless.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body class="form">

  <header class="header">

    <section>

      <a href="../index.html" class="logo">
        <img src="../assets/images/Logo.png" alt="Logo Barbearia do Guel">
      </a>

      <nav class="navbar">
        <a href="pagina-barbeiros.html">Voltar</a>
      </nav>

    </section>

  </header>


  <main class="form">

    <form id="formulario">

      <h1>Agende seu horário</h1>


      <label for="servico">Serviço</label>

      <select id="servico" required>

        <option value="" disabled selected hidden>Escolha o serviço</option>

        <option value="corte">Corte R$30</option>

        <option value="corte_barba">Corte + Barba R$50</option>

      </select>



      <label for="dia">Escolha o dia</label>

      <select id="dia" required>
        <option value="" disabled selected hidden>Seu Dia</option>
      </select>



      <label for="horario">Horários Disponíveis</label>

      <div class="custom-select-wrapper">

        <div class="custom-select" id="horarioDropdown">

          <span class="selected">Escolha o Dia primeiro</span>

          <div class="select-options hidden" id="horarioOptions"></div>

        </div>

      </div>

      <input type="hidden" id="horarioHidden">



      <label for="nome">Nome</label>

      <input type="text" id="nome" placeholder="Seu nome" required>



      <label for="numero">Número (WhatsApp)</label>

      <input type="text" id="numero" placeholder="(11) 91234-5678" required>



      <button type="submit">Confirmar Agendamento</button>

    </form>

  </main>



  <script>

    document.addEventListener("DOMContentLoaded", () => {

      const form = document.getElementById("formulario")

      const nomeInput = document.getElementById("nome")

      const numeroInput = document.getElementById("numero")

      const diaSelect = document.getElementById("dia")

      const horarioDropdown = document.getElementById("horarioDropdown")

      const horarioOptions = document.getElementById("horarioOptions")

      const horarioHiddenInput = document.getElementById("horarioHidden")

      const horarioSelected = horarioDropdown.querySelector(".selected")



      /* SOMENTE SÁBADO */

      const diasInfo = [

        { key: "sabado", numero: 6, label: "Sábado" }

      ]



      const mapaDeDatas = {}



      function formatYMD(d) {

        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`

      }



      function getProximaData(diaSemana) {

        const hoje = new Date()

        const diaAtual = hoje.getDay()

        let delta = diaSemana - diaAtual

        if (delta < 0) delta += 7

        const futura = new Date()

        futura.setDate(hoje.getDate() + delta)

        return futura

      }



      /* GERAR DIA */

      diasInfo.forEach(dia => {

        const dt = getProximaData(dia.numero)

        const opt = document.createElement("option")

        opt.value = dia.key

        opt.text = dia.label

        diaSelect.appendChild(opt)

        mapaDeDatas[dia.key] = formatYMD(dt)

      })



      /* CARREGAR HORÁRIOS */

      diaSelect.addEventListener("change", async () => {

        const diaKey = diaSelect.value

        const dataISO = mapaDeDatas[diaKey]

        horarioOptions.innerHTML = ""

        horarioSelected.textContent = "Carregando..."


        const res = await fetch(`http://localhost:3000/horarios-livres/${dataISO}`)

        const horarios = await res.json()

        horarioSelected.textContent = "Escolha seu horário"


        horarios.forEach(hor => {

          const btn = document.createElement("button")

          btn.type = "button"

          btn.className = "btn horario"

          btn.textContent = hor

          btn.addEventListener("click", () => {

            horarioSelected.textContent = hor

            horarioHiddenInput.value = hor

            horarioOptions.classList.add("hidden")

          })

          horarioOptions.appendChild(btn)

        })

      })



      horarioDropdown.addEventListener("click", () => {

        horarioOptions.classList.toggle("hidden")

      })



      /* FORMATAR TELEFONE */

      numeroInput.addEventListener("input", () => {

        let v = numeroInput.value.replace(/\D/g, "")

        if (v.length > 11) v = v.slice(0, 11)

        if (v.length > 6) {

          numeroInput.value = `(${v.slice(0, 2)}) ${v.slice(2, 7)}-${v.slice(7)}`

        } else if (v.length > 2) {

          numeroInput.value = `(${v.slice(0, 2)}) ${v.slice(2)}`

        } else {

          numeroInput.value = v

        }

      })



      /* ENVIAR AGENDAMENTO */

      form.addEventListener("submit", async e => {

        e.preventDefault()

        const nome = nomeInput.value.trim()

        const numero = numeroInput.value.trim()

        const dia = mapaDeDatas[diaSelect.value]

        const horario = horarioHiddenInput.value

        if (!horario) {

          return alert("Escolha um horário")

        }

        const sucesso = await agendar(nome, numero, dia, horario)

        if (sucesso) {

          alert("Agendamento confirmado!")

          window.location.href = "pagina-barbeiros.html"

        } else {

          alert("Horário já ocupado")

        }

      })

    })



    async function agendar(nome, numero, dia, horario) {

      const barbeiro = "gustavo"

      const r = await fetch("http://localhost:3000/agendar", {

        method: "POST",

        headers: { "Content-Type": "application/json" },

        body: JSON.stringify({

          nome,
          numero,
          dia,
          horario,
          barbeiro

        })

      })

      const j = await r.json()

      return j.sucesso === true

    }

  </script>

</body>

</html>
